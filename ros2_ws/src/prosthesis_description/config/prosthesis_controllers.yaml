controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz
    
# ===== JOINT STATE BROADCASTER =====
# publishes state of all joint states in parameter
# to a topic of type sensor_msgs/msg/JointState
joint_state_broadcaster:
  ros__parameters:
    type: joint_state_broadcaster/JointStateBroadcaster
    activate_on_startup: true
    joints:
      - joint_base_x
      - joint_base_y
      - joint_base_z
      - joint_base_roll
      - joint_base_pitch
      - joint_base_yaw
      - joint_wrist_x
      - joint_wrist_y
      - joint_thumb_1_x
      - joint_thumb_1_y
      - joint_thumb_2
      - joint_thumb_3
      - joint_index_1
      - joint_index_2
      - joint_index_3
      - joint_middle_1
      - joint_middle_2
      - joint_middle_3
      - joint_ring_1
      - joint_ring_2
      - joint_ring_3
      - joint_little_1
      - joint_little_2
      - joint_little_3
    interfaces:
      - position
      - velocity

# ===== TRAJECTORY CONTROLLER =====
# creates an action called /joint_trajectory_controller/follow_joint_trajectory 
# of type control_msgs::action::FollowJointTrajectory
joint_trajectory_controller:
  ros__parameters:
    type: joint_trajectory_controller/JointTrajectoryController
    activate_on_startup: true
    joints:
      - joint_base_x
      - joint_base_y
      - joint_base_z
      - joint_base_roll
      - joint_base_pitch
      - joint_base_yaw
      - joint_wrist_x
      - joint_wrist_y
      - joint_thumb_1_x
      - joint_thumb_1_y
      - joint_thumb_2
      - joint_thumb_3
      - joint_index_1
      - joint_index_2
      - joint_index_3
      - joint_middle_1
      - joint_middle_2
      - joint_middle_3
      - joint_ring_1
      - joint_ring_2
      - joint_ring_3
      - joint_little_1
      - joint_little_2
      - joint_little_3
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: true
    allow_nonzero_velocity_at_trajectory_end: true